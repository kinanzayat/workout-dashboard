<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kinan's Workout Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      padding: 16px;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; padding-bottom: 16px; gap: 10px; flex-wrap: wrap;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    h1 { font-size: 1.5rem; }
    h1 span { color: #00d4ff; }
    h2 { margin: 26px 0 14px; font-size: 1.1rem; }
    .muted { color: #8f96a3; }
    .last-update { color: #7e8797; font-size: 0.85rem; }

    .banner {
      margin-bottom: 20px; padding: 16px; border-radius: 16px;
      background: linear-gradient(135deg, rgba(0,212,255,0.14), rgba(0,212,255,0.03));
      border: 1px solid rgba(0,212,255,0.25);
    }
    .banner .title { font-size: 1.2rem; font-weight: 700; }
    .banner .sub { color: #adc2da; margin-top: 6px; font-size: 0.95rem; }
    .rule-list { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 10px; border-radius: 999px; font-size: 0.78rem;
      background: rgba(255,255,255,0.08); color: #d8e7f5;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .pill.gym { background: rgba(52,211,153,0.14); color: #8df1c8; }
    .pill.note { background: rgba(245,158,11,0.14); color: #f7d28b; }
    .pill.warn { background: rgba(248,113,113,0.12); color: #fca5a5; }

    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 22px; }
    .stat-card {
      background: rgba(255,255,255,0.05); border-radius: 14px; padding: 16px; text-align: center;
    }
    .stat-card .value { font-size: 1.8rem; font-weight: 800; color: #00d4ff; }
    .stat-card .label { color: #96a0af; margin-top: 6px; font-size: 0.82rem; }

    .day-selector { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
    .day-btn {
      padding: 10px 16px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05); color: #9aa5b5; cursor: pointer;
      font-size: 0.88rem; font-weight: 700;
    }
    .day-btn.active { background: #00d4ff; color: #07131f; border-color: #00d4ff; }
    .day-btn .day-label { display: block; margin-top: 3px; font-weight: 400; font-size: 0.73rem; }

    .section-card {
      background: rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; margin-bottom: 18px;
    }
    .exercise-row {
      background: rgba(255,255,255,0.05); border-radius: 12px; padding: 14px; margin-bottom: 10px;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .exercise-name { font-weight: 800; margin-bottom: 8px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .details { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; font-size: 0.86rem; }
    .label { color: #8f96a3; }
    .value { color: #dff4ff; font-weight: 600; }
    .good { color: #4ade80; }
    .bad { color: #fb7185; }
    .warn { color: #f59e0b; }
    .small-note { margin-top: 8px; color: #cfd6df; font-size: 0.82rem; }
    .warmups { margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 0.8rem; color: #b6bfd0; }
    .warmups div { display: flex; justify-content: space-between; padding: 2px 0; }

    .grid-2 { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 16px; }
    .cardio-card, .log-card, .ex-card {
      background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; margin-bottom: 8px;
    }
    .ex-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 10px; }
    .ex-card h4 { margin-bottom: 6px; font-size: 0.95rem; }
    .curr { font-size: 1.05rem; font-weight: 700; margin-bottom: 5px; }
    .prog { font-size: 0.83rem; color: #4ade80; }
    .prog.down { color: #f87171; }
    .gym-line, .note-line { margin-top: 6px; font-size: 0.78rem; color: #aeb9c8; }
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 10px; }
    .calendar .hdr { text-align: center; color: #677282; font-size: 0.68rem; padding: 4px; }
    .calendar .day { aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.76rem; }
    .calendar .day.active { background: #4ade80; color: #04120b; font-weight: 700; }
    .calendar .day.empty { background: rgba(255,255,255,0.03); color: #46505e; }
    .calendar .day.today { border: 2px solid #00d4ff; }

    #pw-overlay {
      position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }
    #pw-box { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; text-align: center; }
    #pw-box input {
      margin-top: 14px; padding: 14px 18px; width: 240px; border-radius: 10px; border: none;
      background: rgba(255,255,255,0.1); color: white; text-align: center;
    }
    #pw-box button {
      margin-top: 12px; padding: 12px 24px; border-radius: 10px; border: none;
      background: #00d4ff; color: #08131d; font-weight: 800; cursor: pointer;
    }
    #pw-err { color: #f87171; margin-top: 10px; display: none; }
    .hidden { display: none !important; }

    @media (max-width: 760px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .grid-2 { grid-template-columns: 1fr; }
      .details { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="pw-overlay">
    <div id="pw-box">
      <h2>🏋️ Workout Dashboard</h2>
      <p class="muted">Enter password</p>
      <input type="password" id="pw" placeholder="Password" onkeypress="if(event.key==='Enter')unlock()" />
      <br />
      <button onclick="unlock()">Enter</button>
      <p id="pw-err">Wrong password</p>
    </div>
  </div>

  <div class="container hidden" id="app">
    <header>
      <h1>🏋️ <span>Kinan's</span> Dashboard</h1>
      <span class="last-update" id="lastUpdate"></span>
    </header>

    <div class="banner">
      <div class="title" id="nextUp"></div>
      <div class="sub">Generated from the workout log. No more hand-maintained fake dashboard state.</div>
      <div class="rule-list" id="ruleList"></div>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="value" id="sTotal">0</div><div class="label">Workout days</div></div>
      <div class="stat-card"><div class="value" id="sStreak">0</div><div class="label">Week streak</div></div>
      <div class="stat-card"><div class="value" id="sImproved">0</div><div class="label">Improved lifts</div></div>
      <div class="stat-card"><div class="value" id="sGyms">0</div><div class="label">Tracked gyms</div></div>
    </div>

    <div class="day-selector" id="daySelector"></div>
    <div class="section-card" id="todaySection"></div>

    <div class="grid-2">
      <div>
        <h2>💪 Exercise Progress</h2>
        <div id="exerciseProgress"></div>
      </div>
      <div>
        <h2>🚴 Warmups / Cardio</h2>
        <div id="cardioList"></div>

        <h2>🧾 Latest Session Summary</h2>
        <div class="section-card" id="recentSession"></div>

        <h2>📅 Last 28 Days</h2>
        <div class="section-card">
          <div class="calendar" id="calendar"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="workout-data.js"></script>
  <script>
    const DATA = window.WORKOUT_DATA;
    const state = { selectedDayIdx: 0 };

    function unlock() {
      if (document.getElementById('pw').value === 'bigmike') {
        document.getElementById('pw-overlay').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        init();
      } else {
        document.getElementById('pw-err').style.display = 'block';
      }
    }

    function gymLabel(gymId) {
      return DATA.gyms[gymId]?.label || gymId || 'Unknown gym';
    }

    function formatSets(entry) {
      return entry.sets.join(',');
    }

    function formatEntry(entry) {
      return `${entry.weightText} × ${formatSets(entry)}`;
    }

    function compareEntry(entries, idx) {
      const current = entries[idx];
      for (let i = idx - 1; i >= 0; i--) {
        if (entries[i].gymId === current.gymId && current.gymId !== 'unknown') return entries[i];
      }
      return idx > 0 ? entries[idx - 1] : null;
    }

    function changeSummary(current, prev) {
      if (!prev) return 'New baseline';
      const notes = [];
      if (current.gymId !== prev.gymId && current.gymId !== 'unknown' && prev.gymId !== 'unknown') {
        notes.push('gym changed');
      }
      if (current.weightValue != null && prev.weightValue != null) {
        const dw = +(current.weightValue - prev.weightValue).toFixed(1);
        if (dw > 0) notes.push(`+${dw}${current.unit}`);
        if (dw < 0) notes.push(`${dw}${current.unit}`);
      }
      const dr = current.bestSet - prev.bestSet;
      if (dr > 0) notes.push(`+${dr} reps`);
      if (dr < 0) notes.push(`${dr} reps`);
      if (!notes.length) notes.push('same result');
      return notes.join(', ');
    }

    function splitByDay(day) {
      return DATA.split.find(s => s.day === day);
    }

    function latestEntryForKey(key) {
      const entries = DATA.exercises[key] || [];
      return entries.length ? entries[entries.length - 1] : null;
    }

    function init() {
      document.getElementById('lastUpdate').textContent = `Updated: ${DATA.lastUpdate || '—'} · generated ${DATA.generatedAt}`;
      document.getElementById('nextUp').textContent = `Next up: Day ${DATA.nextSplitDay} — ${splitByDay(DATA.nextSplitDay).label}`;
      state.selectedDayIdx = DATA.nextSplitDay - 1;
      renderRules();
      renderStats();
      renderDaySelector();
      renderToday();
      renderExerciseProgress();
      renderCardio();
      renderRecentSession();
      renderCalendar();
    }

    function renderRules() {
      const el = document.getElementById('ruleList');
      const items = [
        '2 sets tracked',
        'Missing 2nd set ⇒ same as 1st',
        'Compare same gym first',
        'Exercise notes kept',
      ];
      el.innerHTML = items.map(i => `<span class="pill">${i}</span>`).join('');
    }

    function renderStats() {
      document.getElementById('sTotal').textContent = DATA.workoutDays.length;
      document.getElementById('sGyms').textContent = Object.keys(DATA.gyms).length - 1;

      const weeks = {};
      DATA.workoutDays.forEach(d => {
        const dt = new Date(d);
        const wk = Math.floor((dt - new Date('2026-01-05')) / (7 * 86400000));
        weeks[wk] = (weeks[wk] || 0) + 1;
      });
      const currWk = Math.floor((new Date(DATA.lastUpdate) - new Date('2026-01-05')) / (7 * 86400000));
      let streak = 0;
      for (let w = currWk; w >= currWk - 30; w--) {
        if (weeks[w] && weeks[w] >= 2) streak++; else if (w < currWk) break;
      }
      document.getElementById('sStreak').textContent = streak;

      let improved = 0;
      Object.entries(DATA.exercises).forEach(([key, entries]) => {
        if (entries.length < 2) return;
        const last = entries[entries.length - 1];
        const prev = compareEntry(entries, entries.length - 1);
        if (!prev) return;
        if ((last.weightValue || 0) > (prev.weightValue || 0) || last.bestSet > prev.bestSet) improved++;
      });
      document.getElementById('sImproved').textContent = improved;
    }

    function renderDaySelector() {
      const el = document.getElementById('daySelector');
      el.innerHTML = '';
      DATA.split.forEach((s, i) => {
        const btn = document.createElement('div');
        btn.className = 'day-btn' + (i === state.selectedDayIdx ? ' active' : '');
        btn.innerHTML = `Day ${s.day}<span class="day-label">${s.label}</span>`;
        btn.onclick = () => {
          state.selectedDayIdx = i;
          renderDaySelector();
          renderToday();
        };
        el.appendChild(btn);
      });
    }

    function renderToday() {
      const split = DATA.split[state.selectedDayIdx];
      const sec = document.getElementById('todaySection');
      let html = `<div class="exercise-name" style="font-size:1.15rem; margin-bottom:14px;">🎯 Day ${split.day} — ${split.label} <span class="pill">${split.day === DATA.nextSplitDay ? 'NEXT UP' : 'REFERENCE'}</span></div>`;

      split.keys.forEach(key => {
        const meta = DATA.exerciseMeta[key];
        const entries = DATA.exercises[key] || [];
        if (!entries.length) return;
        const last = entries[entries.length - 1];
        const prev = compareEntry(entries, entries.length - 1);
        const hitTarget = last.bestSet >= 10;
        const w = last.weightValue || 0;
        const warm1 = w ? Math.round(w * 0.5 * 2) / 2 : null;
        const warm2 = w ? Math.round(w * 0.8 * 2) / 2 : null;

        html += `
          <div class="exercise-row">
            <div class="exercise-name">
              ${meta?.name || key}
              <span class="pill gym">${gymLabel(last.gymId)}</span>
              ${last.note ? '<span class="pill note">note saved</span>' : ''}
            </div>
            <div class="details">
              <div><span class="label">Last:</span> <span class="value ${hitTarget ? 'good' : 'warn'}">${formatEntry(last)} ${hitTarget ? '✅' : '❌'}</span></div>
              <div><span class="label">Compare vs:</span> <span class="value">${prev ? formatEntry(prev) : '—'}</span></div>
              <div><span class="label">Progress:</span> <span class="value">${changeSummary(last, prev)}</span></div>
              <div><span class="label">Target:</span> <span class="value">${hitTarget ? 'Ready to increase or note machine cap' : 'Stay here until 10'}</span></div>
            </div>
            ${last.note ? `<div class="small-note">📝 ${last.note}</div>` : ''}
            ${warm1 ? `<div class="warmups"><div><span>Warmup 1</span><span>${warm1}${last.unit} × 12</span></div><div><span>Warmup 2</span><span>${warm2}${last.unit} × 5-6</span></div></div>` : ''}
          </div>`;
      });

      sec.innerHTML = html;
    }

    function renderExerciseProgress() {
      const groups = ['Chest', 'Back', 'Legs', 'Shoulders', 'Arms'];
      const el = document.getElementById('exerciseProgress');
      el.innerHTML = '';

      groups.forEach(group => {
        let cards = '';
        Object.entries(DATA.exercises).forEach(([key, entries]) => {
          const meta = DATA.exerciseMeta[key];
          if (!meta || meta.group !== group || !entries.length) return;
          const last = entries[entries.length - 1];
          const prev = compareEntry(entries, entries.length - 1);
          const delta = prev ? last.bestSet - prev.bestSet : 0;
          const cls = delta < 0 ? 'down' : '';
          cards += `
            <div class="ex-card">
              <h4>${meta.name}</h4>
              <div class="curr">${formatEntry(last)}</div>
              <div class="prog ${cls}">${changeSummary(last, prev)}</div>
              <div class="gym-line">🏢 ${gymLabel(last.gymId)}</div>
              ${last.note ? `<div class="note-line">📝 ${last.note}</div>` : ''}
            </div>`;
        });
        if (!cards) return;
        el.innerHTML += `<h2>${group}</h2><div class="ex-grid">${cards}</div>`;
      });
    }

    function renderCardio() {
      const el = document.getElementById('cardioList');
      el.innerHTML = DATA.cardio.slice(0, 6).map(c => `
        <div class="cardio-card">
          <div><strong>${c.date}</strong> · ${c.activity}</div>
          <div class="muted" style="margin-top:6px;">${c.summary}</div>
          <div class="muted" style="margin-top:4px; font-size:0.82rem;">${c.notes}</div>
        </div>`).join('');
    }

    function renderRecentSession() {
      const el = document.getElementById('recentSession');
      const session = DATA.recentSession || [];
      if (!session.length) {
        el.innerHTML = '<div class="muted">No recent session found.</div>';
        return;
      }
      el.innerHTML = session.map(item => {
        const cur = item.current;
        const prev = item.previous;
        const parts = [];
        if (item.weightDelta != null && item.weightDelta !== 0) parts.push(`${item.weightDelta > 0 ? '+' : ''}${item.weightDelta}${cur.unit}`);
        if (item.repDelta != null && item.repDelta !== 0) parts.push(`${item.repDelta > 0 ? '+' : ''}${item.repDelta} reps`);
        const progress = parts.length ? parts.join(', ') : 'no change / baseline';
        return `
          <div class="log-card">
            <div><strong>${item.name}</strong></div>
            <div class="muted" style="margin-top:5px;">${prev ? formatEntry(prev) : '—'} → ${formatEntry(cur)}</div>
            <div class="gym-line">🏢 ${gymLabel(cur.gymId)} · ${progress}</div>
            ${cur.note ? `<div class="note-line">📝 ${cur.note}</div>` : ''}
          </div>`;
      }).join('');
    }

    function renderCalendar() {
      const cal = document.getElementById('calendar');
      cal.innerHTML = '';
      const today = new Date(DATA.lastUpdate || new Date().toISOString().slice(0, 10));
      ['S','M','T','W','T','F','S'].forEach(d => cal.innerHTML += `<div class="hdr">${d}</div>`);
      const start = new Date(today); start.setDate(start.getDate() - 27);
      const pad = start.getDay();
      for (let i = 0; i < pad; i++) cal.innerHTML += '<div class="day empty"></div>';
      for (let i = 0; i < 28; i++) {
        const d = new Date(start); d.setDate(d.getDate() + i);
        const ds = d.toISOString().split('T')[0];
        const isW = DATA.workoutDays.includes(ds);
        const isToday = ds === (DATA.lastUpdate || '');
        cal.innerHTML += `<div class="day ${isW ? 'active' : 'empty'} ${isToday ? 'today' : ''}">${d.getDate()}</div>`;
      }
    }
  </script>
</body>
</html>
