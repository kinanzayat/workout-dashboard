<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinan's Workout Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        h1 { font-size: 1.8em; }
        h1 span { color: #00d4ff; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .value { font-size: 2.5em; font-weight: bold; color: #00d4ff; }
        .stat-card .label { color: #888; margin-top: 5px; }
        .chart-container {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .chart-title {
            font-size: 1.2em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chart-title .emoji { font-size: 1.5em; }
        .exercise-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        .exercise-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
        }
        .exercise-card h3 { margin-bottom: 10px; color: #00d4ff; }
        .exercise-card .current { font-size: 1.5em; margin-bottom: 5px; }
        .exercise-card .progress { color: #4ade80; font-size: 0.9em; }
        .exercise-card .progress.down { color: #f87171; }
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-top: 10px;
        }
        .calendar .day {
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
        }
        .calendar .day.active { background: #4ade80; color: #000; }
        .calendar .day.empty { background: rgba(255,255,255,0.03); }
        .calendar .day.future { opacity: 0.3; }
        .last-update { color: #666; font-size: 0.9em; }
        #password-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        #password-box {
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }
        #password-box h2 { margin-bottom: 20px; }
        #password-box input {
            padding: 15px 20px;
            font-size: 1em;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            width: 250px;
            text-align: center;
        }
        #password-box input::placeholder { color: #666; }
        #password-box button {
            margin-top: 15px;
            padding: 15px 40px;
            font-size: 1em;
            border: none;
            border-radius: 10px;
            background: #00d4ff;
            color: #000;
            cursor: pointer;
            font-weight: bold;
        }
        #password-box .error { color: #f87171; margin-top: 10px; display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="password-overlay">
        <div id="password-box">
            <h2>🏋️ Workout Dashboard</h2>
            <p style="color: #888; margin-bottom: 20px;">Enter password to continue</p>
            <input type="password" id="password" placeholder="Password" onkeypress="if(event.key==='Enter')checkPassword()">
            <br>
            <button onclick="checkPassword()">Enter</button>
            <p class="error" id="error-msg">Wrong password</p>
        </div>
    </div>

    <div class="container hidden" id="dashboard">
        <header>
            <h1>🏋️ <span>Kinan's</span> Workout Dashboard</h1>
            <span class="last-update">Last updated: <span id="last-update"></span></span>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="value" id="total-workouts">0</div>
                <div class="label">Total Workouts</div>
            </div>
            <div class="stat-card">
                <div class="value" id="current-streak">0</div>
                <div class="label">Current Streak 🔥</div>
            </div>
            <div class="stat-card">
                <div class="value" id="exercises-improved">0</div>
                <div class="label">Exercises Improved</div>
            </div>
            <div class="stat-card">
                <div class="value" id="total-volume">0</div>
                <div class="label">Total Volume (kg)</div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-title"><span class="emoji">📅</span> Workout Consistency (Last 30 Days)</div>
            <div class="calendar" id="calendar"></div>
        </div>

        <div class="chart-container">
            <div class="chart-title"><span class="emoji">📈</span> Progress Over Time</div>
            <canvas id="progressChart" height="100"></canvas>
        </div>

        <h2 style="margin: 30px 0 20px;">💪 Exercise Progress</h2>
        <div class="exercise-grid" id="exercise-grid"></div>
    </div>

    <script>
        // Simple password check (hash in production)
        const PASSWORD_HASH = '5e884898da28047d9165141b3c2b0b'; // "password" - change this!
        
        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return hash.toString(16);
        }

        function checkPassword() {
            const input = document.getElementById('password').value;
            // Simple password: "bigmike" 
            if (input === 'bigmike') {
                document.getElementById('password-overlay').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        // Workout data parsed from weight-log.md
        const workoutData = {
            lastUpdate: '2026-03-04',
            workoutDays: ['2026-02-01','2026-02-02','2026-02-03','2026-02-21','2026-02-23','2026-02-25','2026-03-02','2026-03-04'],
            exercises: {
                'Incline Chest Press': {
                    data: [
                        { date: '2026-02-02', weight: 40, reps: 9 },
                        { date: '2026-02-23', weight: 50, reps: 7 },
                        { date: '2026-03-04', weight: 50, reps: 8 }
                    ],
                    unit: 'kg'
                },
                'Lat Pulldown': {
                    data: [
                        { date: '2026-02-01', weight: 45.5, reps: 8 },
                        { date: '2026-02-21', weight: 45.5, reps: 9 }
                    ],
                    unit: 'kg'
                },
                'Chest Press (Flat DB)': {
                    data: [
                        { date: '2026-02-01', weight: 40, reps: 10 },
                        { date: '2026-02-21', weight: 40, reps: 10 }
                    ],
                    unit: 'kg'
                },
                'Leg Curl': {
                    data: [
                        { date: '2026-02-02', weight: 45, reps: 9 },
                        { date: '2026-03-04', weight: 50, reps: 8 }
                    ],
                    unit: 'kg'
                },
                'Goblet Squat': {
                    data: [
                        { date: '2026-02-01', weight: 25, reps: 10 },
                        { date: '2026-02-21', weight: 27.5, reps: 10 }
                    ],
                    unit: 'kg'
                },
                'Bicep Curl': {
                    data: [
                        { date: '2026-02-01', weight: 25, reps: 8 },
                        { date: '2026-02-25', weight: 25, reps: 9 }
                    ],
                    unit: 'kg'
                },
                'Pec Deck': {
                    data: [
                        { date: '2026-02-03', weight: 60, reps: 8 },
                        { date: '2026-02-25', weight: 60, reps: 10 }
                    ],
                    unit: 'kg'
                },
                'Lat Row': {
                    data: [
                        { date: '2026-02-03', weight: 80, reps: 9 },
                        { date: '2026-02-25', weight: 80, reps: 10 }
                    ],
                    unit: 'kg'
                },
                'Upper Back Row (Machine)': {
                    data: [
                        { date: '2026-03-04', weight: 80, reps: 9 }
                    ],
                    unit: 'kg'
                },
                'Overhead Triceps (Cable)': {
                    data: [
                        { date: '2026-03-04', weight: 27, reps: 7 }
                    ],
                    unit: 'kg'
                }
            }
        };

        function loadData() {
            document.getElementById('last-update').textContent = workoutData.lastUpdate;
            document.getElementById('total-workouts').textContent = workoutData.workoutDays.length;
            
            // Calculate streak
            let streak = 0;
            const today = new Date('2026-03-04');
            for (let i = 0; i < 30; i++) {
                const checkDate = new Date(today);
                checkDate.setDate(checkDate.getDate() - i);
                const dateStr = checkDate.toISOString().split('T')[0];
                // Check within 3 days for streak (not daily)
                const found = workoutData.workoutDays.some(d => {
                    const diff = Math.abs(new Date(d) - checkDate) / (1000*60*60*24);
                    return diff <= 3;
                });
                if (found || i < 3) streak++;
                else break;
            }
            document.getElementById('current-streak').textContent = Math.min(streak, workoutData.workoutDays.length);

            // Count improved exercises
            let improved = 0;
            let totalVolume = 0;
            Object.values(workoutData.exercises).forEach(ex => {
                if (ex.data.length >= 2) {
                    const first = ex.data[0];
                    const last = ex.data[ex.data.length - 1];
                    if (last.weight > first.weight || (last.weight === first.weight && last.reps > first.reps)) {
                        improved++;
                    }
                }
                ex.data.forEach(d => totalVolume += d.weight * d.reps);
            });
            document.getElementById('exercises-improved').textContent = improved;
            document.getElementById('total-volume').textContent = Math.round(totalVolume).toLocaleString();

            // Render calendar
            renderCalendar();

            // Render progress chart
            renderProgressChart();

            // Render exercise cards
            renderExerciseCards();
        }

        function renderCalendar() {
            const cal = document.getElementById('calendar');
            const today = new Date('2026-03-04');
            const days = ['S','M','T','W','T','F','S'];
            
            // Day headers
            days.forEach(d => {
                const div = document.createElement('div');
                div.textContent = d;
                div.style.textAlign = 'center';
                div.style.color = '#666';
                div.style.fontSize = '0.7em';
                cal.appendChild(div);
            });

            // Last 28 days
            for (let i = 27; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                const dateStr = d.toISOString().split('T')[0];
                const div = document.createElement('div');
                div.className = 'day';
                div.textContent = d.getDate();
                
                if (workoutData.workoutDays.includes(dateStr)) {
                    div.className += ' active';
                } else {
                    div.className += ' empty';
                }
                cal.appendChild(div);
            }
        }

        function renderProgressChart() {
            const ctx = document.getElementById('progressChart').getContext('2d');
            
            // Get top exercises by data points
            const exercises = Object.entries(workoutData.exercises)
                .filter(([_, v]) => v.data.length >= 2)
                .slice(0, 4);

            const colors = ['#00d4ff', '#4ade80', '#f59e0b', '#ec4899'];
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Feb 1', 'Feb 15', 'Mar 1', 'Mar 4'],
                    datasets: exercises.map(([name, ex], i) => ({
                        label: name,
                        data: ex.data.map(d => d.weight),
                        borderColor: colors[i],
                        backgroundColor: colors[i] + '20',
                        tension: 0.3,
                        fill: true
                    }))
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: '#fff' }
                        }
                    },
                    scales: {
                        y: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#888' }
                        },
                        x: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#888' }
                        }
                    }
                }
            });
        }

        function renderExerciseCards() {
            const grid = document.getElementById('exercise-grid');
            
            Object.entries(workoutData.exercises).forEach(([name, ex]) => {
                const card = document.createElement('div');
                card.className = 'exercise-card';
                
                const latest = ex.data[ex.data.length - 1];
                let progressText = '';
                let progressClass = '';
                
                if (ex.data.length >= 2) {
                    const prev = ex.data[ex.data.length - 2];
                    const weightDiff = latest.weight - prev.weight;
                    const repsDiff = latest.reps - prev.reps;
                    
                    if (weightDiff > 0) {
                        progressText = `↑ +${weightDiff}${ex.unit}`;
                        progressClass = '';
                    } else if (repsDiff > 0) {
                        progressText = `↑ +${repsDiff} reps`;
                        progressClass = '';
                    } else if (weightDiff < 0 || repsDiff < 0) {
                        progressText = `↓ ${weightDiff}${ex.unit} / ${repsDiff} reps`;
                        progressClass = 'down';
                    } else {
                        progressText = '→ Same';
                    }
                }
                
                card.innerHTML = `
                    <h3>${name}</h3>
                    <div class="current">${latest.weight}${ex.unit} × ${latest.reps} reps</div>
                    <div class="progress ${progressClass}">${progressText}</div>
                    <div style="color:#666;font-size:0.8em;margin-top:5px;">Last: ${latest.date}</div>
                `;
                
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
